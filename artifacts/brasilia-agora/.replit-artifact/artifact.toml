kind = "web"
previewPath = "/"
title = "SBC Agora"
version = "1.0.0"
id = "artifacts/brasilia-agora"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22613

[services.development]
run = "pnpm --filter @workspace/sbc-agora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sbc-agora", "run", "build" ]
publicDir = "artifacts/brasilia-agora/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22613"
BASE_PATH = "/"
